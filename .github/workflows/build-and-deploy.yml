name: Build and Deploy to AKS

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: webapi
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  NAMESPACE: webapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # AI Review Step (Azure OpenAI)
      # ---------------------------------------------------
      - name: Install Python dependencies
        run: pip install openai

      - name: Run AI Review (Architecture + Config)
        run: python3 ai-review.py
        env:
          AOAI_ENDPOINT: ${{ secrets.AOAI_ENDPOINT }}
          AOAI_KEY: ${{ secrets.AOAI_KEY }}
          AOAI_DEPLOYMENT: ${{ secrets.AOAI_DEPLOYMENT }}

      # ---------------------------------------------------
      # API Behavior + Contract QA (Azure OpenAI)
      # ---------------------------------------------------
      - name: Run API Contract Review
        run: python3 ai-api-contract-review.py
        env:
          AOAI_ENDPOINT: ${{ secrets.AOAI_ENDPOINT }}
          AOAI_KEY: ${{ secrets.AOAI_KEY }}
          AOAI_DEPLOYMENT: ${{ secrets.AOAI_DEPLOYMENT }}

      # ---------------------------------------------------
      # .NET Build + Tests + Coverage
      # ---------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Add tool path
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run unit + integration tests
        run: |
          dotnet test \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --verbosity normal

      - name: Generate code coverage report
        run: |
          reportgenerator \
            -reports:TestResults/**/coverage.cobertura.xml \
            -targetdir:CoverageReport \
            -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  deploy-to-aks:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

